name: Build and Deploy to EC2

# Trigger: auto when push to main branch, or manual from GitHub UI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Stage 1: CI — Run Tests
  # Same as Jenkins stage('Test') { sh 'mvn test' }
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      # Clone source code onto the runner
      - name: Checkout code
        uses: actions/checkout@v3

      # Install JDK 17 on runner (needed to run mvn test)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Run all unit tests — deploy is blocked if any test fails
      - name: Run Tests
        run: mvn test

  # ─────────────────────────────────────────
  # Stage 2: CD — Build & Deploy
  # Runs only if Stage 1 (test) passes
  # Same as Jenkins stage('Build') + stage('Deploy')
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test  # wait for test job to pass first

    steps:
      # Clone source code again for building Docker image
      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub using secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image from Dockerfile and push to Docker Hub
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: seangngorn68/hello-spring:latest

      # SSH into EC2 and restart the container with the new image
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull seangngorn68/hello-spring:latest
            sudo docker stop hello-spring || true
            sudo docker rm hello-spring || true
            sudo docker run -d -p 9080:9080 --name hello-spring seangngorn68/hello-spring:latest
